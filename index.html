<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>究極・計算機 (鬼限定トラップ＆演出強化版)</title>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: sans-serif; }
    /* 電卓 */
    #study-calc { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f0f0; }
    #calc-box { background: #333; padding: 20px; border-radius: 10px; width: 300px; }
    #calc-display { width: 100%; height: 50px; background: #eee; text-align: right; font-size: 24px; border: none; margin-bottom: 10px; padding: 10px; box-sizing: border-box; }
    .calc-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .btn { background: #666; color: white; border: none; padding: 20px; font-size: 18px; border-radius: 5px; cursor: pointer; }
    .btn-op { background: #ff9500; }

    /* メニュー */
    #secret-menu { display: none; width: 100vw; height: 100vh; background: #111; color: white; flex-direction: column; align-items: center; justify-content: center; position: absolute; top:0; left:0; z-index: 50; }
    .menu-box { background: #222; padding: 25px; border-radius: 15px; border: 1px solid #0f0; text-align: center; }
    .menu-btn { width: 280px; padding: 15px; margin: 8px; font-size: 18px; cursor: pointer; background: #222; color: #0f0; border: 2px solid #0f0; border-radius: 10px; font-weight: bold; }

    /* ゲーム画面 */
    .game-screen { display: none; width: 100vw; height: 100vh; position: relative; }
    #maze-canvas { display: block; background: #000; }
    .back-btn { position: absolute; top: 10px; right: 10px; padding: 10px 15px; background: #ff4444; color: white; border: none; cursor: pointer; border-radius: 5px; z-index: 100; }
    
    /* タイマー */
    #game-timer { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); font-size: 32px; color: #fff; font-weight: bold; text-shadow: 0 0 10px #0f0; z-index: 120; }

    /* ルーレット演出用 */
    #roulette-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 200; background: #000; flex-direction: row; }
    .roulette-side { width: 50%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; border: 1px solid #333; }
    .role-name { font-size: 60px; margin-top: 20px; }

    /* HUD */
    .hp-hud { position: absolute; top: 50px; width: 100%; display: flex; justify-content: space-around; pointer-events: none; z-index: 110; }
    .hp-container { width: 150px; background: #333; border: 2px solid #fff; height: 12px; border-radius: 6px; overflow: hidden; }
    .hp-bar { height: 100%; width: 100%; transition: width 0.2s; }
    #p1-hp-fill { background: #f00; }
    #p2-hp-fill { background: #0ff; }

    .skill-hud { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-around; pointer-events: none; }
    .skill-label { background: rgba(0,0,0,0.7); padding: 8px 15px; border: 2px solid; border-radius: 10px; font-weight: bold; font-family: monospace; }
  </style>
</head>
<body>

  <div id="study-calc">
    <div id="calc-box">
      <input type="text" id="calc-display" value="0" readonly>
      <div class="calc-buttons">
        <button class="btn" onclick="addNum('7')">7</button><button class="btn" onclick="addNum('8')">8</button><button class="btn" onclick="addNum('9')">9</button><button class="btn btn-op">÷</button>
        <button class="btn" onclick="addNum('4')">4</button><button class="btn" onclick="addNum('5')">5</button><button class="btn" onclick="addNum('6')">6</button><button class="btn btn-op">×</button>
        <button class="btn" onclick="addNum('1')">1</button><button class="btn" onclick="addNum('2')">2</button><button class="btn" onclick="addNum('3')">3</button><button class="btn btn-op" onclick="showMenu()">−</button> 
        <button class="btn" onclick="location.reload()">C</button><button class="btn" onclick="addNum('0')">0</button><button class="btn">=</button><button class="btn btn-op">+</button>
      </div>
    </div>
  </div>

  <div id="secret-menu">
    <div class="menu-box">
      <h1 style="color:#0f0;">DARK ABILITY TAG</h1>
      <button class="menu-btn" onclick="startMaze()">🏠 鬼ごっこを開始</button>
      <button class="menu-btn" onclick="startCPS()">🖱️ CPSテスト</button>
      <button class="menu-btn" onclick="startAIM()">🎯 AIMテスト</button>
      <p style="color:#666; cursor:pointer;" onclick="location.reload()">◀ 戻る</p>
    </div>
  </div>

  <div id="maze-screen" class="game-screen">
    <div id="game-timer">03:00</div>
    <div id="roulette-overlay">
      <div id="roulette-left" class="roulette-side"><span style="color:red; font-size:24px;">1P(赤)</span><div class="role-name">???</div></div>
      <div id="roulette-right" class="roulette-side"><span style="color:cyan; font-size:24px;">2P(水色)</span><div class="role-name">???</div></div>
    </div>

    <div class="hp-hud">
      <div><div id="p1-hp-label" style="color:red; font-size:10px; text-align:center;">1P HP</div><div class="hp-container"><div id="p1-hp-fill" class="hp-bar"></div></div></div>
      <div><div id="p2-hp-label" style="color:cyan; font-size:10px; text-align:center;">2P HP</div><div class="hp-container"><div id="p2-hp-fill" class="hp-bar"></div></div></div>
    </div>
    <button class="back-btn" onclick="showMenu()">EXIT</button>
    <canvas id="maze-canvas"></canvas>
    <div class="skill-hud">
      <div id="skill1" class="skill-label" style="border-color: red; color: red;">1P [F]: WAIT</div>
      <div id="skill2" class="skill-label" style="border-color: cyan; color: cyan;">2P [M]: WAIT</div>
    </div>
  </div>

  <script>
    let mazeTimer, keys = {};
    const TILE_SIZE = 60, GRID = 51;
    let p1 = { x: 1.5, y: 1.5, speed: 0.15, boost: 0, cd: 0, hp: 100, stun: 0, role: "", color: "red", itemTime: 0, trapCount: 5 };
    let p2 = { x: GRID-2.5, y: GRID-2.5, speed: 0.15, boost: 0, cd: 0, hp: 100, stun: 0, role: "", color: "cyan", itemTime: 0, trapCount: 5 };
    let globalMap = [], items = [], traps = [], flash = 0;
    let timeLeft = 180;

    function addNum(n) { const d = document.getElementById('calc-display'); if(d.value==="0") d.value=n; else d.value+=n; }
    function showMenu() { allHide(); document.getElementById('secret-menu').style.display='flex'; }
    function allHide() {
      document.querySelectorAll('.game-screen, #study-calc, #secret-menu').forEach(s => s.style.display = 'none');
      if(mazeTimer) cancelAnimationFrame(mazeTimer);
    }

    function createMaze() {
      let m = Array.from({length: GRID}, (_, y) => Array.from({length: GRID}, (_, x) => (x===0||x===GRID-1||y===0||y===GRID-1) ? 1 : 0));
      for(let y=2; y<GRID-2; y+=2) for(let x=2; x<GRID-2; x+=2) m[y][x] = 1;
      for(let y=2; y<GRID-2; y+=2) for(let x=2; x<GRID-2; x+=2) {
        let dirs = [[0,-1],[0,1],[-1,0],[1,0]];
        let [dx, dy] = dirs[Math.floor(Math.random()*4)];
        m[y+dy][x+dx] = 1;
      }
      for(let i=1; i<=3; i++) for(let j=1; j<=3; j++) { m[i][j]=0; m[GRID-1-i][GRID-1-j]=0; }
      return m;
    }

    function startMaze() {
      allHide();
      const cvs = document.getElementById('maze-canvas');
      cvs.width = window.innerWidth; cvs.height = window.innerHeight;
      globalMap = createMaze();
      spawnItems(5);
      traps = []; timeLeft = 180;
      
      document.getElementById('maze-screen').style.display = 'block';
      const overlay = document.getElementById('roulette-overlay');
      const rtL = document.querySelector('#roulette-left .role-name');
      const rtR = document.querySelector('#roulette-right .role-name');
      overlay.style.display = 'flex';
      
      let count = 0;
      let itv = setInterval(() => {
        rtL.innerText = count % 2 === 0 ? "鬼" : "逃";
        rtR.innerText = count % 2 === 0 ? "逃" : "鬼";
        count++;
        if(count > 20) {
          clearInterval(itv);
          const p1Oni = Math.random() < 0.5;
          p1.role = p1Oni ? "鬼" : "逃げ";
          p2.role = p1Oni ? "逃げ" : "鬼";
          // 決定された役割を表示
          rtL.innerText = p1.role;
          rtR.innerText = p2.role;
          // 鬼の色を強調
          rtL.style.color = p1.role === "鬼" ? "#ff4444" : "#fff";
          rtR.style.color = p2.role === "鬼" ? "#ff4444" : "#fff";
          
          setTimeout(() => {
            overlay.style.display = 'none';
            initGame();
          }, 2000);
        }
      }, 80);
    }

    function spawnItems(n) {
      items = [];
      for(let i=0; i<n; i++) {
        let ix, iy;
        do { ix = Math.floor(Math.random()*(GRID-2))+1; iy = Math.floor(Math.random()*(GRID-2))+1; }
        while(globalMap[iy][ix] === 1);
        items.push({x: ix+0.5, y: iy+0.5});
      }
    }

    function initGame() {
      p1.x = 1.5; p1.y = 1.5; p1.hp = 100; p1.stun = 0; p1.cd = 0; p1.trapCount = 5;
      p2.x = GRID-2.5; p2.y = GRID-2.5; p2.hp = 100; p2.stun = 0; p2.cd = 0; p2.trapCount = 5;
      window.onkeydown = (e) => {
        keys[e.code] = true;
        if(e.code === 'KeyF') p1.role === "鬼" ? triggerBoost(p1) : triggerTP(p1);
        if(e.code === 'KeyM') p2.role === "鬼" ? triggerBoost(p2) : triggerTP(p2);
        // トラップ設置：鬼のときだけ実行
        if(e.code === 'KeyG' && p1.role === "鬼") placeTrap(p1);
        if(e.code === 'KeyN' && p2.role === "鬼") placeTrap(p2); 
      };
      window.onkeyup = (e) => keys[e.code] = false;
      gameTimerLoop();
      loop();
    }

    function gameTimerLoop() {
      if (timeLeft <= 0) { alert("タイムアップ！逃げの勝利！"); location.reload(); return; }
      timeLeft--;
      let m = Math.floor(timeLeft/60), s = timeLeft%60;
      document.getElementById('game-timer').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      if(document.getElementById('maze-screen').style.display === 'block') setTimeout(gameTimerLoop, 1000);
    }

    function placeTrap(p) {
      if(p.trapCount > 0 && p.stun <= 0) {
        traps.push({x: Math.floor(p.x)+0.5, y: Math.floor(p.y)+0.5});
        p.trapCount--;
      }
    }

    function triggerBoost(p) { if(p.cd <= 0 && p.stun <= 0) { p.boost = 240; p.cd = 900; } }
    function triggerTP(p) {
      if(p.cd > 0 || p.stun > 0) return;
      let tx, ty;
      do { tx = Math.floor(Math.random()*(GRID-2))+1.5; ty = Math.floor(Math.random()*(GRID-2))+1.5; } 
      while(globalMap[Math.floor(ty)][Math.floor(tx)]===1);
      p.x = tx; p.y = ty; p.cd = 1800;
    }

    function canMove(nx, ny) {
      const r = 0.25;
      if(nx < 0 || nx >= GRID || ny < 0 || ny >= GRID) return false;
      return !(globalMap[Math.floor(ny-r)][Math.floor(nx-r)] === 1 || globalMap[Math.floor(ny+r)][Math.floor(nx-r)] === 1 ||
               globalMap[Math.floor(ny-r)][Math.floor(nx+r)] === 1 || globalMap[Math.floor(ny+r)][Math.floor(nx+r)] === 1);
    }

    function loop() {
      [p1, p2].forEach((p, idx) => {
        let s = (p.role === "鬼" && p.boost > 0) ? 0.25 : 0.15;
        if(p.role === "逃げ" && p.hp <= 25) s += 0.03;
        if(p.itemTime > 0) s += 0.05;
        
        if(p.stun <= 0) {
          let k = idx === 0 ? ['KeyW','KeyS','KeyA','KeyD'] : ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'];
          if(keys[k[0]] && canMove(p.x, p.y-s)) p.y-=s;
          if(keys[k[1]] && canMove(p.x, p.y+s)) p.y+=s;
          if(keys[k[2]] && canMove(p.x-s, p.y)) p.x-=s;
          if(keys[k[3]] && canMove(p.x+s, p.y)) p.x+=s;
          
          items = items.filter(it => {
            if(Math.hypot(p.x-it.x, p.y-it.y) < 0.6) { p.itemTime = 300; return false; }
            return true;
          });

          if(p.role === "逃げ") {
            traps = traps.filter(t => {
              if(Math.hypot(p.x-t.x, p.y-t.y) < 0.5) { p.stun = 180; return false; }
              return true;
            });
          }
        } else p.stun--;
        if(p.boost > 0) p.boost--; if(p.cd > 0) p.cd--; if(p.itemTime > 0) p.itemTime--;
      });

      let oni = p1.role === "鬼" ? p1 : p2;
      let esc = p1.role === "逃げ" ? p1 : p2;
      let d = Math.hypot(p1.x-p2.x, p1.y-p2.y);
      if(d < 0.5 && oni.stun <= 0) {
        esc.hp -= 25; oni.stun = 180; flash = 10;
        document.getElementById('p1-hp-fill').style.width = p1.hp + "%";
        document.getElementById('p2-hp-fill').style.width = p2.hp + "%";
        if(esc.hp <= 0) { alert("鬼の勝利！"); location.reload(); return; }
      }

      document.getElementById('skill1').innerText = `1P [F]:${p1.cd>0?'WAIT':(p1.role==='鬼'?'BOOST':'TP')} ${p1.role==='鬼'?'[G]:TRAP('+p1.trapCount+')':''}`;
      document.getElementById('skill2').innerText = `2P [M]:${p2.cd>0?'WAIT':(p2.role==='鬼'?'BOOST':'TP')} ${p2.role==='鬼'?'[N]:TRAP('+p2.trapCount+')':''}`;

      const cvs = document.getElementById('maze-canvas'), ctx = cvs.getContext('2d');
      ctx.fillStyle = "#000"; ctx.fillRect(0,0,cvs.width,cvs.height);
      drawSide(ctx, p1, 0, cvs.width/2, p1.role==="逃げ", d);
      drawSide(ctx, p2, cvs.width/2, cvs.width/2, p2.role==="逃げ", d);
      if(flash > 0) { ctx.fillStyle=`rgba(255,255,255,${flash/10})`; ctx.fillRect(0,0,cvs.width,cvs.height); flash--; }
      mazeTimer = requestAnimationFrame(loop);
    }

    function drawSide(ctx, focus, offX, w, isEsc, dOni) {
      ctx.save(); ctx.beginPath(); ctx.rect(offX, 0, w, window.innerHeight); ctx.clip();
      if(isEsc && dOni < 8) { ctx.fillStyle = `rgba(255,0,0,${(1-dOni/8)*0.4})`; ctx.fillRect(offX,0,w,window.innerHeight); }
      ctx.translate(offX + w/2 - focus.x*TILE_SIZE, window.innerHeight/2 - focus.y*TILE_SIZE);
      
      for(let y=0; y<GRID; y++) for(let x=0; x<GRID; x++) if(globalMap[y][x]===1) {
        ctx.fillStyle = `rgba(255,255,255,${Math.max(0,1-Math.hypot(x+0.5-focus.x,y+0.5-focus.y)/6)})`;
        ctx.fillRect(x*TILE_SIZE+1, y*TILE_SIZE+1, TILE_SIZE-2, TILE_SIZE-2);
      }
      items.forEach(it => { ctx.fillStyle="yellow"; ctx.font="24px serif"; ctx.fillText("★", it.x*TILE_SIZE-12, it.y*TILE_SIZE+8); });
      traps.forEach(t => { 
        ctx.strokeStyle="#f00"; ctx.lineWidth=2; ctx.strokeRect(t.x*TILE_SIZE-15, t.y*TILE_SIZE-15, 30, 30);
        ctx.beginPath(); ctx.moveTo(t.x*TILE_SIZE-15, t.y*TILE_SIZE); ctx.lineTo(t.x*TILE_SIZE+15, t.y*TILE_SIZE); ctx.stroke();
      });
      
      if(!isEsc) {
        const target = (focus === p1) ? p2 : p1;
        const angle = Math.atan2(target.y - focus.y, target.x - focus.x);
        ctx.save(); ctx.translate(focus.x*TILE_SIZE, focus.y*TILE_SIZE); ctx.rotate(angle);
        ctx.fillStyle="rgba(255,0,0,0.7)"; ctx.beginPath(); ctx.moveTo(40,0); ctx.lineTo(25,-10); ctx.lineTo(25,10); ctx.fill(); ctx.restore();
      }
      drawPlayer(ctx, p1, "red"); drawPlayer(ctx, p2, "cyan");
      ctx.restore();
    }

    function drawPlayer(ctx, p, col) {
      if(p.stun > 0) {
        ctx.strokeStyle = p.role === "逃げ" ? "#ff00ff" : "yellow";
        ctx.lineWidth = 4; ctx.beginPath();
        for(let i=0; i<10; i++){ let a=Math.random()*6.2, r=20+Math.random()*15; ctx.lineTo(p.x*TILE_SIZE+Math.cos(a)*r, p.y*TILE_SIZE+Math.sin(a)*r); }
        ctx.stroke();
        ctx.fillStyle="#fff"; ctx.font="bold 16px sans-serif"; ctx.fillText(p.role==="逃げ"?"TRAPPED!":"REST", p.x*TILE_SIZE-35, p.y*TILE_SIZE-30);
      }
      ctx.fillStyle = (p.stun > 0 && Math.floor(Date.now()/100)%2) ? "white" : col;
      ctx.beginPath(); ctx.arc(p.x*TILE_SIZE, p.y*TILE_SIZE, 15, 0, 7); ctx.fill();
    }

    function startCPS() { allHide(); alert("CPSテストは現在迷路に注力するため休止中です"); showMenu(); }
    function startAIM() { allHide(); alert("AIMテストは現在迷路に注力するため休止中です"); showMenu(); }
  </script>
</body>
</html>
