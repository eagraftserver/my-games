<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>計算機</title>
  <style>
    body { margin: 0; font-family: sans-serif; overflow: hidden; background: #f0f0f0; }
    #study-calc { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    #calc-box { background: #333; padding: 20px; border-radius: 10px; width: 300px; }
    #calc-display { width: 100%; height: 50px; background: #eee; text-align: right; font-size: 24px; border: none; margin-bottom: 10px; border-radius: 5px; padding: 10px; box-sizing: border-box; }
    .calc-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .btn { background: #666; color: white; border: none; padding: 20px; font-size: 18px; border-radius: 5px; cursor: pointer; }
    .btn-op { background: #ff9500; }

    #secret-menu { display: none; width: 100vw; height: 100vh; background: #111; color: white; flex-direction: column; align-items: center; justify-content: center; }
    .menu-btn { width: 250px; padding: 20px; margin: 10px; font-size: 20px; cursor: pointer; background: #222; color: #0f0; border: 2px solid #0f0; border-radius: 10px; transition: 0.2s; }
    .menu-btn:hover { background: #0f0; color: #000; }

    .game-screen { display: none; width: 100vw; height: 100vh; position: relative; background: #000; }
    .ui-layer { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.7); padding: 12px; border-radius: 8px; pointer-events: none; z-index: 10; font-size: 14px; }
    .back-to-menu { position: absolute; top: 10px; right: 10px; padding: 10px 15px; cursor: pointer; z-index: 100; background: #ff4444; color: white; border: none; border-radius: 5px; font-weight: bold; }

    #cps-area, #aim-area { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #target { width: 250px; height: 250px; background: #333; border: 4px dashed #0f0; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; user-select: none; border-radius: 50%; }
    .aim-target { position: absolute; width: 45px; height: 45px; background: radial-gradient(circle, #f00 30%, #fff 31%, #fff 60%, #f00 61%); border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px #f00; }
  </style>
</head>
<body>

  <div id="study-calc">
    <div id="calc-box">
      <input type="text" id="calc-display" value="0" readonly>
      <div class="calc-buttons">
        <button class="btn" onclick="addNum('7')">7</button><button class="btn" onclick="addNum('8')">8</button><button class="btn" onclick="addNum('9')">9</button><button class="btn btn-op">÷</button>
        <button class="btn" onclick="addNum('4')">4</button><button class="btn" onclick="addNum('5')">5</button><button class="btn" onclick="addNum('6')">6</button><button class="btn btn-op">×</button>
        <button class="btn" onclick="addNum('1')">1</button><button class="btn" onclick="addNum('2')">2</button><button class="btn" onclick="addNum('3')">3</button><button class="btn btn-op" onclick="showMenu()">−</button> 
        <button class="btn" onclick="location.reload()">C</button><button class="btn" onclick="addNum('0')">0</button><button class="btn">=</button><button class="btn btn-op">+</button>
      </div>
    </div>
  </div>

  <div id="secret-menu">
    <h1 style="letter-spacing: 5px; color: #0f0;">GAME CENTER</h1>
    <button class="menu-btn" onclick="startMaze()">🏠 ランダム3D迷路</button>
    <button class="menu-btn" onclick="startCPS()">🖱️ CPSテスト</button>
    <button class="menu-btn" onclick="startAIM()">🎯 AIMテスト</button>
    <p style="margin-top:20px; color:#666; cursor:pointer;" onclick="location.reload()">◀ 電卓に戻る</p>
  </div>

  <div id="maze-screen" class="game-screen">
    <button class="back-to-menu" onclick="showMenu()">EXIT</button>
    <div class="ui-layer">🏠 <b>Random Maze</b><br>移動: WASD / 矢印キー</div>
    <canvas id="maze-canvas"></canvas>
  </div>

  <div id="cps-screen" class="game-screen">
    <button class="back-to-menu" onclick="showMenu()">EXIT</button>
    <div id="cps-area">
      <h2 id="cps-timer" style="color:#fff; font-family: monospace;">TIME: 10.0s</h2>
      <div id="target" onclick="doCPS()">CLICK!!</div>
      <h1 id="cps-count" style="color:#0f0; font-size: 40px;">0</h1>
    </div>
  </div>

  <div id="aim-screen" class="game-screen">
    <button class="back-to-menu" onclick="showMenu()">EXIT</button>
    <div id="aim-area">
      <h2 id="aim-timer" style="color:#fff; font-family: monospace;">TIME: 30.0s</h2>
      <h1 id="aim-count" style="color:#f44; font-size: 40px;">HITS: 0</h1>
      <button id="aim-start-btn" onclick="runAIM()" style="padding:20px 40px; font-size:24px; background:#0f0; border:none; border-radius:10px; cursor:pointer;">START GAME</button>
    </div>
  </div>

  <script>
    function addNum(n) { const d = document.getElementById('calc-display'); if(d.value==="0") d.value=n; else d.value+=n; }
    function allHide() {
      document.getElementById('study-calc').style.display = 'none';
      document.getElementById('secret-menu').style.display = 'none';
      document.querySelectorAll('.game-screen').forEach(s => s.style.display = 'none');
      if(mazeTimer) cancelAnimationFrame(mazeTimer);
    }
    function showMenu() { allHide(); document.getElementById('secret-menu').style.display = 'flex'; }

    // --- 3D迷路 (ランダム生成 & 高画質化) ---
    let mazeTimer, map = [];
    const MAZE_SIZE = 15; // 迷路の広さ（奇数推奨）

    function generateMaze(size) {
      let m = Array.from({length: size}, () => Array(size).fill(1));
      function dig(x, y) {
        m[y][x] = 0;
        let dirs = [[0,2],[0,-2],[2,0],[-2,0]].sort(() => Math.random() - 0.5);
        for(let [dx, dy] of dirs) {
          let nx = x + dx, ny = y + dy;
          if(nx>0 && nx<size-1 && ny>0 && ny<size-1 && m[ny][nx]===1) {
            m[y + dy/2][x + dx/2] = 0; dig(nx, ny);
          }
        }
      }
      dig(1, 1);
      m[size-2][size-2] = 2; // ゴール地点
      return m;
    }

    function startMaze() {
      allHide();
      document.getElementById('maze-screen').style.display = 'block';
      const canvas = document.getElementById('maze-canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth; canvas.height = window.innerHeight;
      map = generateMaze(MAZE_SIZE);
      let player = { x: 1.5, y: 1.5, dir: 0 }, keys = {};
      window.onkeydown = (e) => keys[e.code] = true;
      window.onkeyup = (e) => keys[e.code] = false;

      function render() {
        if(keys['ArrowLeft'] || keys['KeyA']) player.dir -= 0.05;
        if(keys['ArrowRight'] || keys['KeyD']) player.dir += 0.05;
        let dx = Math.cos(player.dir)*0.07, dy = Math.sin(player.dir)*0.07;
        if(keys['KeyW']) { if(map[Math.floor(player.y)][Math.floor(player.x+dx)]!==1) player.x+=dx; if(map[Math.floor(player.y+dy)][Math.floor(player.x)]!==1) player.y+=dy; }
        if(keys['KeyS']) { if(map[Math.floor(player.y)][Math.floor(player.x-dx)]!==1) player.x-=dx; if(map[Math.floor(player.y-dy)][Math.floor(player.x)]!==1) player.y-=dy; }

        // 背景
        let grad = ctx.createLinearGradient(0,0,0,canvas.height);
        grad.addColorStop(0, "#001122"); grad.addColorStop(0.5, "#224466"); grad.addColorStop(0.5, "#111"); grad.addColorStop(1, "#222");
        ctx.fillStyle = grad; ctx.fillRect(0,0,canvas.width,canvas.height);

        const res = 300; // 解像度（線の数）
        for(let i=0; i<res; i++) {
          let angle = (player.dir-0.5) + (i/res), rx=player.x, ry=player.y, rdx=Math.cos(angle)*0.03, rdy=Math.sin(angle)*0.03, dist=0, hit=0;
          while(dist<15) { rx+=rdx; ry+=rdy; dist+=0.03; if(map[Math.floor(ry)][Math.floor(rx)]>0){ hit=map[Math.floor(ry)][Math.floor(rx)]; break; } }
          let h = canvas.height/(dist*Math.cos(angle-player.dir)), s = Math.max(0.1, 1-dist/12);
          ctx.fillStyle = hit===2 ? `rgb(${255*s},${200*s},0)` : `rgb(${120*s},${60*s},${20*s})`;
          ctx.fillRect(i*(canvas.width/res), (canvas.height-h)/2, (canvas.width/res)+1, h);
          if(hit===1 && dist<7) { // 窓の描画
            ctx.fillStyle = `rgba(100,200,255,${s*0.5})`;
            ctx.fillRect(i*(canvas.width/res), (canvas.height-h)/2 + h*0.3, (canvas.width/res)+1, h*0.2);
          }
        }
        if(map[Math.floor(player.y)][Math.floor(player.x)]===2) { alert("MAZE CLEAR!"); showMenu(); return; }
        mazeTimer = requestAnimationFrame(render);
      }
      render();
    }

    // --- CPS & AIM Logic (共通) ---
    let cpsCount=0, cpsTime=10, cpsActive=false;
    function startCPS() { allHide(); document.getElementById('cps-screen').style.display = 'block'; resetCPS(); }
    function resetCPS() { cpsCount=0; cpsTime=10; cpsActive=false; document.getElementById('cps-count').innerText="0"; document.getElementById('cps-timer').innerText="TIME: 10.0s"; }
    function doCPS() {
      if(cpsTime<=0) return;
      if(!cpsActive) {
        cpsActive=true;
        let t = setInterval(() => { cpsTime-=0.1; document.getElementById('cps-timer').innerText=`TIME: ${Math.max(0,cpsTime).toFixed(1)}s`; if(cpsTime<=0){clearInterval(t); alert("SCORE: "+cpsCount);} },100);
      }
      cpsCount++; document.getElementById('cps-count').innerText=cpsCount;
    }

    let aimHits=0, aimTime=30, aimActive=false;
    function startAIM() { allHide(); document.getElementById('aim-screen').style.display = 'block'; resetAIM(); }
    function resetAIM() { aimHits=0; aimTime=30; aimActive=false; document.getElementById('aim-count').innerText="HITS: 0"; document.getElementById('aim-timer').innerText="TIME: 30.0s"; document.getElementById('aim-start-btn').style.display='block'; document.querySelectorAll('.aim-target').forEach(t=>t.remove()); }
    function runAIM() {
      aimActive=true; document.getElementById('aim-start-btn').style.display='none'; spawnTarget();
      let t = setInterval(() => { aimTime-=0.1; document.getElementById('aim-timer').innerText=`TIME: ${Math.max(0,aimTime).toFixed(1)}s`; if(aimTime<=0){aimActive=false; clearInterval(t); alert("HITS: "+aimHits); resetAIM();} },100);
    }
    function spawnTarget() {
      if(!aimActive) return;
      document.querySelectorAll('.aim-target').forEach(t=>t.remove());
      const t = document.createElement('div'); t.className='aim-target';
      t.style.top = (Math.random()*70+15)+"%"; t.style.left = (Math.random()*80+10)+"%";
      t.onclick = () => { aimHits++; document.getElementById('aim-count').innerText=`HITS: ${aimHits}`; spawnTarget(); };
      document.getElementById('aim-area').appendChild(t);
    }
  </script>
</body>
</html>
