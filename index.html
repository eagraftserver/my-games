<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>究極・計算機 (暗闇鬼ごっこ版)</title>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #000; }
    /* 電卓 */
    #study-calc { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f0f0; }
    #calc-box { background: #333; padding: 20px; border-radius: 10px; width: 300px; }
    #calc-display { width: 100%; height: 50px; background: #eee; text-align: right; font-size: 24px; border: none; margin-bottom: 10px; padding: 10px; box-sizing: border-box; }
    .calc-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .btn { background: #666; color: white; border: none; padding: 20px; font-size: 18px; border-radius: 5px; cursor: pointer; }
    .btn-op { background: #ff9500; }

    /* メニュー */
    #secret-menu { display: none; width: 100vw; height: 100vh; background: #111; color: white; flex-direction: column; align-items: center; justify-content: center; position: absolute; top:0; left:0; z-index: 50; }
    .menu-box { background: #222; padding: 25px; border-radius: 15px; border: 1px solid #0f0; text-align: center; }
    .menu-btn { width: 280px; padding: 15px; margin: 8px; font-size: 18px; cursor: pointer; background: #222; color: #0f0; border: 2px solid #0f0; border-radius: 10px; font-weight: bold; }

    /* ゲーム画面 */
    .game-screen { display: none; width: 100vw; height: 100vh; position: relative; }
    #maze-canvas { display: block; background: #000; }
    .ui-layer { position: absolute; top: 10px; left: 10px; color: #0f0; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 5px; z-index: 10; font-size: 12px; }
    .back-btn { position: absolute; top: 10px; right: 10px; padding: 10px 15px; background: #ff4444; color: white; border: none; cursor: pointer; border-radius: 5px; z-index: 100; }
    
    /* スキルHUD */
    .skill-hud { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-around; pointer-events: none; }
    .skill-label { background: rgba(0,0,0,0.7); padding: 8px 15px; border: 2px solid; border-radius: 10px; font-weight: bold; font-family: monospace; }
  </style>
</head>
<body>

  <div id="study-calc">
    <div id="calc-box">
      <input type="text" id="calc-display" value="0" readonly>
      <div class="calc-buttons">
        <button class="btn" onclick="addNum('7')">7</button><button class="btn" onclick="addNum('8')">8</button><button class="btn" onclick="addNum('9')">9</button><button class="btn btn-op">÷</button>
        <button class="btn" onclick="addNum('4')">4</button><button class="btn" onclick="addNum('5')">5</button><button class="btn" onclick="addNum('6')">6</button><button class="btn btn-op">×</button>
        <button class="btn" onclick="addNum('1')">1</button><button class="btn" onclick="addNum('2')">2</button><button class="btn" onclick="addNum('3')">3</button><button class="btn btn-op" onclick="showMenu()">−</button> 
        <button class="btn" onclick="location.reload()">C</button><button class="btn" onclick="addNum('0')">0</button><button class="btn">=</button><button class="btn btn-op">+</button>
      </div>
    </div>
  </div>

  <div id="secret-menu">
    <div class="menu-box">
      <h1 style="color:#0f0;">DARK ABILITY TAG</h1>
      <button class="menu-btn" onclick="startMaze()">🏠 暗闇鬼ごっこを開始</button>
      <button class="menu-btn" onclick="startCPS()">🖱️ CPSテスト</button>
      <button class="menu-btn" onclick="startAIM()">🎯 AIMテスト</button>
      <p style="color:#666; cursor:pointer;" onclick="location.reload()">◀ 電卓に戻る</p>
    </div>
  </div>

  <div id="maze-screen" class="game-screen">
    <button class="back-btn" onclick="showMenu()">EXIT</button>
    <div class="ui-layer">1P(鬼): WASD | [F]:加速<br>2P(逃): 矢印 | [M]:TP<br>※鬼が近づくと右画面の端が赤くなる！</div>
    <canvas id="maze-canvas"></canvas>
    
    <div class="skill-hud">
      <div id="skill1" class="skill-label" style="border-color: red; color: red;">1P [F] BOOST: READY</div>
      <div id="skill2" class="skill-label" style="border-color: cyan; color: cyan;">2P [M] TP: READY</div>
    </div>
  </div>

  <!-- CPS/AIM画面 -->
  <div id="cps-screen" class="game-screen"><button class="back-btn" onclick="showMenu()">EXIT</button><div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh;"><h2 id="cps-timer" style="color:#fff;">10.0s</h2><div style="width:200px; height:200px; border:4px dashed #0f0; border-radius:50%; color:#0f0; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="doCPS()">CLICK!</div><h1 id="cps-count" style="color:#0f0; font-size:40px;">0</h1><h2 id="cps-val" style="color:#0f0; font-size:20px;">CPS: 0.0</h2></div></div>
  <div id="aim-screen" class="game-screen"><button class="back-btn" onclick="showMenu()">EXIT</button><div id="aim-area" style="width:100%; height:100%;"><h2 id="aim-timer" style="color:#fff; position:absolute; top:50px; width:100%; text-align:center;">30.0s</h2><h1 id="aim-count" style="color:#f44; position:absolute; top:80px; width:100%; text-align:center;">HITS: 0</h1><button id="aim-start-btn" onclick="runAIM()" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); padding:15px 30px; background:#0f0; border:none; border-radius:5px; font-weight:bold;">START</button></div></div>

  <script>
    let mazeTimer, cpsInterval, aimInterval, keys = {};
    const TILE_SIZE = 60, GRID = 51;
    let p1 = { x: 1.5, y: 1.5, speed: 0.15, boost: 0, cd: 0 };
    let p2 = { x: GRID-2.5, y: GRID-2.5, cd: 0 };
    let globalMap = [];

    function addNum(n) { const d = document.getElementById('calc-display'); if(d.value==="0") d.value=n; else d.value+=n; }
    function showMenu() { allHide(); document.getElementById('secret-menu').style.display='flex'; }
    function allHide() {
      document.querySelectorAll('.game-screen, #study-calc, #secret-menu').forEach(s => s.style.display = 'none');
      if(mazeTimer) cancelAnimationFrame(mazeTimer);
      if(cpsInterval) clearInterval(cpsInterval);
      if(aimInterval) clearInterval(aimInterval);
    }

    function createMaze() {
      let m = Array.from({length: GRID}, (_, y) => Array.from({length: GRID}, (_, x) => (x===0||x===GRID-1||y===0||y===GRID-1) ? 1 : 0));
      for(let y=2; y<GRID-2; y+=2) for(let x=2; x<GRID-2; x+=2) m[y][x] = 1;
      for(let y=2; y<GRID-2; y+=2) for(let x=2; x<GRID-2; x+=2) {
        let dirs = [[0,-1], [0,1], [-1,0], [1,0]];
        let [dx, dy] = dirs[Math.floor(Math.random()*4)];
        m[y+dy][x+dx] = 1;
      }
      for(let i=1; i<=3; i++) for(let j=1; j<=3; j++) { m[i][j]=0; m[GRID-1-i][GRID-1-j]=0; }
      return m;
    }

    function startMaze() {
      allHide();
      const cvs = document.getElementById('maze-canvas');
      cvs.width = window.innerWidth; cvs.height = window.innerHeight;
      document.getElementById('maze-screen').style.display = 'block';
      globalMap = createMaze();
      p1 = { x: 1.5, y: 1.5, speed: 0.15, boost: 0, cd: 0 };
      p2 = { x: GRID-2.5, y: GRID-2.5, cd: 0 };
      window.onkeydown = (e) => { keys[e.code] = true; if(e.code === 'KeyF') triggerBoost(); if(e.code === 'KeyM') triggerTP(); };
      window.onkeyup = (e) => keys[e.code] = false;
      loop();
    }

    function triggerBoost() { if(p1.cd <= 0) { p1.boost = 300; p1.cd = 1200; } }
    function triggerTP() {
      if(p2.cd > 0) return;
      let found = false;
      while(!found) {
        let tx = Math.floor(Math.random() * (GRID-2)) + 1.5;
        let ty = Math.floor(Math.random() * (GRID-2)) + 1.5;
        let dist = Math.sqrt((tx-p1.x)**2 + (ty-p1.y)**2);
        if(dist > 15 && globalMap[Math.floor(ty)][Math.floor(tx)] === 0) { p2.x = tx; p2.y = ty; found = true; }
      }
      p2.cd = 2400; 
    }

    function canMove(nx, ny) {
      const r = 0.25;
      if(globalMap[Math.floor(ny-r)][Math.floor(nx-r)] === 1) return false;
      if(globalMap[Math.floor(ny+r)][Math.floor(nx-r)] === 1) return false;
      if(globalMap[Math.floor(ny-r)][Math.floor(nx+r)] === 1) return false;
      if(globalMap[Math.floor(ny+r)][Math.floor(nx+r)] === 1) return false;
      return true;
    }

    function loop() {
      let s1 = p1.boost > 0 ? p1.speed * 1.6 : p1.speed;
      if(p1.boost > 0) p1.boost--; if(p1.cd > 0) p1.cd--; if(p2.cd > 0) p2.cd--;

      if(keys['KeyW']) { if(canMove(p1.x, p1.y-s1)) p1.y-=s1; }
      if(keys['KeyS']) { if(canMove(p1.x, p1.y+s1)) p1.y+=s1; }
      if(keys['KeyA']) { if(canMove(p1.x-s1, p1.y)) p1.x-=s1; }
      if(keys['KeyD']) { if(canMove(p1.x+s1, p1.y)) p1.x+=s1; }
      
      if(keys['ArrowUp']) { if(canMove(p2.x, p2.y-0.15)) p2.y-=0.15; }
      if(keys['ArrowDown']) { if(canMove(p2.x, p2.y+0.15)) p2.y+=0.15; }
      if(keys['ArrowLeft']) { if(canMove(p2.x-0.15, p2.y)) p2.x-=0.15; }
      if(keys['ArrowRight']) { if(canMove(p2.x+0.15, p2.y)) p2.x+=0.15; }

      let dist = Math.sqrt((p1.x-p2.x)**2 + (p1.y-p2.y)**2);
      if(dist < 0.5) { alert("鬼の勝利！捕まえました。"); location.reload(); return; }

      document.getElementById('skill1').innerText = p1.boost > 0 ? `BOOST: ${(p1.boost/60).toFixed(1)}s` : (p1.cd > 0 ? `WAIT: ${(p1.cd/60).toFixed(0)}s` : "1P [F] BOOST: READY");
      document.getElementById('skill2').innerText = p2.cd > 0 ? `WAIT: ${(p2.cd/60).toFixed(0)}s` : "2P [M] TP: READY";

      const cvs = document.getElementById('maze-canvas');
      const ctx = cvs.getContext('2d');
      ctx.fillStyle = "#000"; ctx.fillRect(0,0,cvs.width,cvs.height);

      draw(ctx, p1, 0, cvs.width/2); 
      draw(ctx, p2, cvs.width/2, cvs.width/2, true, dist); // 2P側だけ接近警告を渡す

      ctx.fillStyle = "#0f0"; ctx.fillRect(cvs.width/2-2, 0, 4, cvs.height);
      mazeTimer = requestAnimationFrame(loop);
    }

    function draw(ctx, focus, offX, w, isEscape = false, distToOni = 999) {
      ctx.save();
      ctx.beginPath(); ctx.rect(offX, 0, w, window.innerHeight); ctx.clip();
      
      // 接近警告エフェクト（逃げ側のみ）
      if(isEscape && distToOni < 10) {
        let intensity = (1 - distToOni/10) * 0.5;
        ctx.fillStyle = `rgba(255, 0, 0, ${intensity})`;
        ctx.fillRect(offX, 0, w, window.innerHeight);
      }

      ctx.translate(offX + w/2 - focus.x*TILE_SIZE, window.innerHeight/2 - focus.y*TILE_SIZE);
      
      const startX = Math.max(0, Math.floor(focus.x - 8));
      const endX = Math.min(GRID, Math.floor(focus.x + 8));
      const startY = Math.max(0, Math.floor(focus.y - 8));
      const endY = Math.min(GRID, Math.floor(focus.y + 8));

      for(let y=startY; y<endY; y++) for(let x=startX; x<endX; x++) {
        if(globalMap[y][x]===1) {
          // 視界制限（自分の中心からの距離で暗くする）
          let d = Math.sqrt((x+0.5-focus.x)**2 + (y+0.5-focus.y)**2);
          let opacity = Math.max(0, 1 - d/6);
          if(opacity > 0) {
            ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
            ctx.fillRect(x*TILE_SIZE+1, y*TILE_SIZE+1, TILE_SIZE-2, TILE_SIZE-2);
          }
        }
      }
      
      // プレイヤー描画（近くの時だけ見える）
      let dToOther = Math.sqrt((p1.x-p2.x)**2 + (p1.y-p2.y)**2);
      let pOpacity = Math.max(0, 1 - dToOther/8);

      if(p1.boost > 0) { ctx.shadowBlur = 20; ctx.shadowColor = "red"; }
      ctx.globalAlpha = (focus === p1) ? 1 : pOpacity;
      ctx.fillStyle="red"; ctx.beginPath(); ctx.arc(p1.x*TILE_SIZE, p1.y*TILE_SIZE, 15, 0, Math.PI*2); ctx.fill();
      
      ctx.globalAlpha = (focus === p2) ? 1 : pOpacity;
      ctx.fillStyle="cyan"; ctx.beginPath(); ctx.arc(p2.x*TILE_SIZE, p2.y*TILE_SIZE, 15, 0, Math.PI*2); ctx.fill();
      
      ctx.restore();
    }

    let cpsCount=0, cpsTime=10, cpsActive=false;
    function startCPS() { allHide(); document.getElementById('cps-screen').style.display='block'; resetCPS(); }
    function resetCPS() { cpsCount=0; cpsTime=10; cpsActive=false; document.getElementById('cps-count').innerText="0"; document.getElementById('cps-val').innerText="CPS: 0.0"; document.getElementById('cps-timer').innerText="TIME: 10.0s"; }
    function doCPS() {
      if(cpsTime<=0) return;
      if(!cpsActive) { cpsActive=true; cpsInterval=setInterval(()=>{ cpsTime-=0.1; document.getElementById('cps-timer').innerText=`TIME: ${Math.max(0,cpsTime).toFixed(1)}s`; document.getElementById('cps-val').innerText=`CPS: ${(cpsCount/(10-cpsTime)).toFixed(1)}`; if(cpsTime<=0){clearInterval(cpsInterval);alert("SCORE:"+cpsCount);}},100); }
      cpsCount++; document.getElementById('cps-count').innerText=cpsCount;
    }
    let aimHits=0, aimTime=30, aimActive=false;
    function startAIM() { allHide(); document.getElementById('aim-screen').style.display='block'; resetAIM(); }
    function resetAIM() { aimHits=0; aimTime=30; aimActive=false; document.getElementById('aim-count').innerText="HITS: 0"; document.getElementById('aim-timer').innerText="30.0s"; document.getElementById('aim-start-btn').style.display='block'; document.querySelectorAll('.aim-target').forEach(t=>t.remove()); }
    function runAIM() { aimActive=true; document.getElementById('aim-start-btn').style.display='none'; spawn(); aimInterval=setInterval(()=>{ aimTime-=0.1; document.getElementById('aim-timer').innerText=`TIME: ${Math.max(0,aimTime).toFixed(1)}s`; if(aimTime<=0){aimActive=false;clearInterval(aimInterval);alert("HITS:"+aimHits);resetAIM();}},100); }
    function spawn() { if(!aimActive)return; document.querySelectorAll('.aim-target').forEach(t=>t.remove()); const t=document.createElement('div'); t.className='aim-target'; t.style.position='absolute'; t.style.width='50px'; t.style.height='50px'; t.style.borderRadius='50%'; t.style.background='radial-gradient(circle, #f00 30%, #fff 31%, #fff 60%, #f00 61%)'; t.style.top=(Math.random()*60+20)+"%"; t.style.left=(Math.random()*80+10)+"%"; t.onclick=()=>{aimHits++;document.getElementById('aim-count').innerText=`HITS:${aimHits}`;spawn();}; document.getElementById('aim-screen').appendChild(t); }
  </script>
</body>
</html>
